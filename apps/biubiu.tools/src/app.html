<!doctype html>
<html lang="%lang%" data-theme="%theme%" data-text-scale="%text-scale%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
		<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
		<link rel="shortcut icon" href="/favicon/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
		<link rel="manifest" href="/favicon/site.webmanifest" />
		<!-- webmcp relay widget -->
		<script src="/webmcp/embed.js"></script>
		<script>
			// Blocking script to prevent theme and text-scale flash.
			// Reads the authoritative unified-settings store first ('biubiu-settings'),
			// then falls back to legacy keys (for users not yet migrated). This must
			// stay in sync with $lib/settings.ts so the first paint never disagrees
			// with the value the client applies on mount.
			(function() {
				var validScales = ['xs', 'sm', 'md', 'lg', 'xl', '2xl'];
				var theme = null;
				var textScale = null;

				try {
					var raw = localStorage.getItem('biubiu-settings');
					if (raw) {
						var s = JSON.parse(raw);
						if (s) {
							theme = s.theme;
							textScale = s.textScale;
						}
					}
				} catch (e) {}

				// Legacy fallback (pre-migration installs still use these flat keys)
				if (theme !== 'dark' && theme !== 'light') {
					theme = localStorage.getItem('theme');
				}
				if (validScales.indexOf(textScale) === -1) {
					textScale = localStorage.getItem('text-scale');
				}

				if (theme === 'dark' || theme === 'light') {
					document.documentElement.setAttribute('data-theme', theme);
				}
				if (textScale && validScales.indexOf(textScale) !== -1) {
					document.documentElement.setAttribute('data-text-scale', textScale);
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script
			src="https://tj.appsdata.org/api/script.js"
			data-site-id="bec8b40684c3"
			defer
		></script>
	</body>
</html>
